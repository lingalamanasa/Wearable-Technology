<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Not Found || Stackly Wearable Technology</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--darker-bg); position: relative; overflow: hidden; }

    .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
    .particle { position: absolute; width: 4px; height: 4px; background: var(--primary-color); border-radius: 50%; opacity: 0; animation: particleFloat linear infinite; }
    .particle:nth-child(1) { left: 10%; animation-duration: 8s; animation-delay: 0s; }
    .particle:nth-child(2) { left: 20%; animation-duration: 12s; animation-delay: 1s; width: 3px; height: 3px; background: var(--secondary-color); }
    .particle:nth-child(3) { left: 35%; animation-duration: 10s; animation-delay: 2s; }
    .particle:nth-child(4) { left: 50%; animation-duration: 14s; animation-delay: 0.5s; width: 5px; height: 5px; background: var(--accent-green); }
    .particle:nth-child(5) { left: 65%; animation-duration: 9s; animation-delay: 1.5s; width: 3px; height: 3px; }
    .particle:nth-child(6) { left: 75%; animation-duration: 11s; animation-delay: 3s; background: var(--secondary-color); }
    .particle:nth-child(7) { left: 85%; animation-duration: 7s; animation-delay: 2.5s; width: 6px; height: 6px; }
    .particle:nth-child(8) { left: 45%; animation-duration: 13s; animation-delay: 0.8s; width: 3px; height: 3px; background: var(--accent-green); }
    .particle:nth-child(9) { left: 55%; animation-duration: 15s; animation-delay: 1.2s; }
    .particle:nth-child(10) { left: 90%; animation-duration: 10s; animation-delay: 3.5s; background: var(--secondary-color); width: 4px; height: 4px; }

    @keyframes particleFloat {
      0% { bottom: -10px; opacity: 0; transform: translateX(0); }
      10% { opacity: 0.6; }
      90% { opacity: 0.6; }
      100% { bottom: 110%; opacity: 0; transform: translateX(80px); }
    }

    .error-glow { position: fixed; top: 50%; left: 50%; width: 500px; height: 500px; background: radial-gradient(circle, rgba(0,180,216,0.08) 0%, transparent 70%); transform: translate(-50%, -50%); z-index: 0; }

    .error-container { text-align: center; position: relative; z-index: 2; }

    .glitch {
      font-size: 10rem; font-family: 'Orbitron', sans-serif; font-weight: 900;
      position: relative; color: white;
      text-shadow: 0.05em 0 0 rgba(255,0,0,0.75), -0.025em -0.05em 0 rgba(0,255,0,0.75), 0.025em 0.05em 0 rgba(0,0,255,0.75);
      animation: glitch 500ms infinite;
    }

    .error-subtitle { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; color: var(--primary-color); margin-bottom: 1rem; letter-spacing: 3px; text-transform: uppercase; }
    .error-desc { color: var(--text-muted); font-size: 1.1rem; max-width: 500px; margin: 0 auto 2.5rem; line-height: 1.8; }

    .error-buttons { display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; margin-bottom: 3rem; }

    .error-logo { display: flex; align-items: center; justify-content: center; gap: 0.6rem; margin-bottom: 2rem; }
    .error-logo svg { height: 35px; width: 35px; }
    .error-logo span { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1.2rem; background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

    @media (max-width: 768px) {
      .glitch { font-size: 6rem; }
      .error-subtitle { font-size: 1.1rem; }
    }
    @media (max-width: 480px) {
      .glitch { font-size: 4rem; }
    }
  </style>
</head>
<body>
  <!-- Particles -->
  <div class="particles">
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    <div class="particle"></div>
  </div>

  <div class="error-glow"></div>

  <div class="error-container">
    <div class="error-logo">
      <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="40" height="40" rx="10" fill="url(#errLG)"/>
        <path d="M12 13h16v3H15v4h10v3H15v4h13v3H12V13z" fill="#fff"/>
        <defs><linearGradient id="errLG" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#00B4D8"/><stop offset="1" stop-color="#7B2FF7"/></linearGradient></defs>
      </svg>
      <span>STACKLY</span>
    </div>

    <div class="glitch" data-text="404">404</div>
    <h2 class="error-subtitle">Page Not Found</h2>
    <p class="error-desc">The page you're looking for doesn't exist or has been moved. Don't worry — let's get you back on track.</p>

    <div class="error-buttons">
      <a href="index.html" class="btn-primary"><i class="bi bi-house-fill"></i> Return Home</a>
      <a href="contact.html" class="btn-secondary"><i class="bi bi-envelope"></i> Contact Support</a>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
